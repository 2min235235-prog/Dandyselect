<title>Mrs.Dandy セラピスト画像合成ツール</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #0b0b0d;
    color: #eee5d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 64px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  h1 {
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    margin: 0 0 4px;
    color: #f0d78c;
  }
  p.sub {
    margin: 0 0 20px;
    font-size: 0.85rem;
    color: #b8ab86;
  }
  .layout {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1100px;
    width: 100%;
  }
  .canvas-wrap {
    position: relative;
    border: 1px solid #3a3324;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    max-width: 480px;
    width: 100%;
  }
  #stage {
    width: 100%;
    height: auto;
    display: block;
    cursor: default;
  }
  .slot-marker {
    position: absolute;
    border: 2px dashed rgba(240,215,140,0);
    box-sizing: border-box;
    transition: border-color 0.15s;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slot-marker.empty {
    border-color: rgba(240,215,140,0.55);
    pointer-events: auto;
    cursor: pointer;
  }
  .slot-marker.empty::after {
    content: "＋ クリックしてアップロード";
    font-size: 0.75rem;
    color: rgba(240,215,140,0.85);
    background: rgba(10,9,6,0.55);
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
    text-align: center;
  }
  .slot-marker:not(.empty) {
    cursor: move;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
  }
  .slot-control {
    background: #16141088;
    border: 1px solid #3a3324;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .slot-control h3 {
    margin: 0 0 8px;
    font-size: 0.9rem;
    color: #f0d78c;
    font-weight: 600;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  input[type="file"] {
    color: #d8cca8;
    font-size: 0.78rem;
    max-width: 100%;
  }
  .zoom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .zoom-row label {
    font-size: 0.75rem;
    color: #b8ab86;
    width: 3.2em;
  }
  input[type="range"] {
    flex: 1;
    accent-color: #f0d78c;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #6b5d33;
    background: #2a2413;
    color: #f0d78c;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.75rem;
  }
  button:hover {
    background: #3a3320;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .clear-btn {
    margin-left: auto;
  }
  .hint {
    font-size: 0.68rem;
    color: #8a7d5c;
    margin-top: 6px;
  }
  .download-area {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .download-btn {
    background: linear-gradient(135deg,#f0d78c,#c9a343);
    color: #1a1509;
    font-weight: 700;
    border: none;
    padding: 12px 16px;
    font-size: 0.95rem;
    border-radius: 8px;
    letter-spacing: 0.05em;
  }
  .download-btn:hover {
    filter: brightness(1.08);
  }
  .drag-hint {
    font-size: 0.72rem;
    color: #8a7d5c;
    text-align: center;
  }
  @media (max-width: 860px) {
    .layout { flex-direction: column; align-items: center; }
    .controls { width: 100%; max-width: 480px; }
  }
</style>

<h1>Mrs.Dandy セラピスト画像合成ツール</h1>
<p class="sub">3つの白枠に画像をアップロードして、位置とズームを調整し、完成画像をダウンロードできます。</p>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="stage"></canvas>
    <div id="markers"></div>
  </div>

  <div class="controls">
    <div class="slot-control" data-slot="0">
      <h3>① 上のセラピスト</h3>
      <div class="row">
        <input type="file" accept="image/*" class="file-input" data-slot="0" />
        <button class="clear-btn" data-slot="0">クリア</button>
      </div>
      <div class="zoom-row">
        <label>拡大</label>
        <input type="range" class="zoom-slider" data-slot="0" min="100" max="300" value="100" step="1" />
      </div>
      <div class="hint">画像内でドラッグして位置を調整できます</div>
    </div>

    <div class="slot-control" data-slot="1">
      <h3>② 左下のセラピスト</h3>
      <div class="row">
        <input type="file" accept="image/*" class="file-input" data-slot="1" />
        <button class="clear-btn" data-slot="1">クリア</button>
      </div>
      <div class="zoom-row">
        <label>拡大</label>
        <input type="range" class="zoom-slider" data-slot="1" min="100" max="300" value="100" step="1" />
      </div>
    </div>

    <div class="slot-control" data-slot="2">
      <h3>③ 右下のセラピスト</h3>
      <div class="row">
        <input type="file" accept="image/*" class="file-input" data-slot="2" />
        <button class="clear-btn" data-slot="2">クリア</button>
      </div>
      <div class="zoom-row">
        <label>拡大</label>
        <input type="range" class="zoom-slider" data-slot="2" min="100" max="300" value="100" step="1" />
      </div>
    </div>

    <div class="download-area">
      <button id="downloadBtn" class="download-btn">画像をダウンロード</button>
      <div class="drag-hint">PNG形式（フル解像度）で保存されます</div>
    </div>
  </div>
</div>

  const CANVAS_W = 1086;
  const CANVAS_H = 1448;
  const EMPTY_FILL = "#efe3df";

  // Slot rectangles in ORIGINAL image pixel coordinates {x,y,w,h}
  const SLOTS = [
    { x: 346, y: 467, w: 385, h: 426 },
    { x: 137, y: 937, w: 362, h: 375 },
    { x: 575, y: 938, w: 358, h: 374 }
  ];

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d");
  const markersEl = document.getElementById("markers");

  const frameImg = new Image();
  const W = CANVAS_W, H = CANVAS_H;

  const slotState = SLOTS.map(() => ({
    img: null,
    zoom: 1,
    offsetX: 0, // fraction of slot size, drag offset
    offsetY: 0,
    dragging: false,
    lastX: 0,
    lastY: 0
  }));

  canvas.width = W;
  canvas.height = H;
  buildMarkers();
  render();

  frameImg.onload = render;
  frameImg.src = FRAME_IMAGE_SRC;

  function buildMarkers() {
    markersEl.innerHTML = "";
    SLOTS.forEach((slot, i) => {
      const m = document.createElement("div");
      m.className = "slot-marker empty";
      m.dataset.slot = i;
      positionMarker(m, slot);
      m.addEventListener("click", () => {
        const fi = document.querySelector('.file-input[data-slot="' + i + '"]');
        if (fi) fi.click();
      });
      markersEl.appendChild(m);
    });
  }

  function positionMarker(el, slot) {
    el.style.left = (slot.x / W * 100) + "%";
    el.style.top = (slot.y / H * 100) + "%";
    el.style.width = (slot.w / W * 100) + "%";
    el.style.height = (slot.h / H * 100) + "%";
  }

  function drawSlotImage(slot, state) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(slot.x, slot.y, slot.w, slot.h);
    ctx.clip();

    if (!state.img) {
      ctx.fillStyle = EMPTY_FILL;
      ctx.fillRect(slot.x, slot.y, slot.w, slot.h);
      ctx.restore();
      return;
    }

    const iw = state.img.naturalWidth;
    const ih = state.img.naturalHeight;
    const coverScale = Math.max(slot.w / iw, slot.h / ih) * state.zoom;
    const drawW = iw * coverScale;
    const drawH = ih * coverScale;

    const maxOffX = Math.max(0, (drawW - slot.w) / 2);
    const maxOffY = Math.max(0, (drawH - slot.h) / 2);

    const cx = slot.x + slot.w / 2 + state.offsetX * maxOffX * -2;
    const cy = slot.y + slot.h / 2 + state.offsetY * maxOffY * -2;

    ctx.drawImage(state.img, cx - drawW / 2, cy - drawH / 2, drawW, drawH);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    SLOTS.forEach((slot, i) => drawSlotImage(slot, slotState[i]));
    if (frameImg.complete && frameImg.naturalWidth) {
      ctx.drawImage(frameImg, 0, 0, W, H);
    }

    SLOTS.forEach((slot, i) => {
      const marker = markersEl.querySelector('.slot-marker[data-slot="' + i + '"]');
      if (marker) {
        marker.classList.toggle("empty", !slotState[i].img);
      }
    });
  }

  document.querySelectorAll(".file-input").forEach(input => {
    input.addEventListener("change", (e) => {
      const idx = parseInt(input.dataset.slot, 10);
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          slotState[idx].img = img;
          slotState[idx].offsetX = 0;
          slotState[idx].offsetY = 0;
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  document.querySelectorAll(".clear-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.slot, 10);
      slotState[idx].img = null;
      const fi = document.querySelector('.file-input[data-slot="' + idx + '"]');
      if (fi) fi.value = "";
      render();
    });
  });

  document.querySelectorAll(".zoom-slider").forEach(slider => {
    slider.addEventListener("input", () => {
      const idx = parseInt(slider.dataset.slot, 10);
      slotState[idx].zoom = parseInt(slider.value, 10) / 100;
      render();
    });
  });

  // Drag-to-reposition directly on canvas
  let activeSlot = -1;
  let dragStartX = 0, dragStartY = 0;
  let dragStartOffX = 0, dragStartOffY = 0;

  function slotAtPoint(px, py) {
    for (let i = 0; i < SLOTS.length; i++) {
      const s = SLOTS[i];
      if (px >= s.x && px <= s.x + s.w && py >= s.y && py <= s.y + s.h && slotState[i].img) {
        return i;
      }
    }
    return -1;
  }

  function canvasPoint(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (clientX - rect.left) / rect.width * W;
    const y = (clientY - rect.top) / rect.height * H;
    return { x, y };
  }

  function startDrag(e) {
    const p = canvasPoint(e);
    const idx = slotAtPoint(p.x, p.y);
    if (idx === -1) return;
    activeSlot = idx;
    dragStartX = p.x;
    dragStartY = p.y;
    dragStartOffX = slotState[idx].offsetX;
    dragStartOffY = slotState[idx].offsetY;
    e.preventDefault();
  }

  function moveDrag(e) {
    if (activeSlot === -1) return;
    const p = canvasPoint(e);
    const s = SLOTS[activeSlot];
    const dx = (p.x - dragStartX) / (s.w / 2) / -2;
    const dy = (p.y - dragStartY) / (s.h / 2) / -2;
    slotState[activeSlot].offsetX = Math.max(-1, Math.min(1, dragStartOffX + dx));
    slotState[activeSlot].offsetY = Math.max(-1, Math.min(1, dragStartOffY + dy));
    render();
    e.preventDefault();
  }

  function endDrag() {
    activeSlot = -1;
  }

  canvas.addEventListener("mousedown", startDrag);
  window.addEventListener("mousemove", moveDrag);
  window.addEventListener("mouseup", endDrag);
  canvas.addEventListener("touchstart", startDrag, { passive: false });
  window.addEventListener("touchmove", moveDrag, { passive: false });
  window.addEventListener("touchend", endDrag);

  document.getElementById("downloadBtn").addEventListener("click", () => {
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "MrsDandy_therapist.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }, "image/png");
  });
})();
</script>
